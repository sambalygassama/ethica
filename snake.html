<script>
(() => {
  const boardSize = 20;
  const board = document.getElementById('game-board');
  const scoreDisplay = document.getElementById('score');
  const highScoreDisplay = document.getElementById('high-score');
  const gameOverOverlay = document.getElementById('game-over');
  const restartBtn = document.getElementById('restart-btn');
  const startScreen = document.getElementById('start-screen');
  const startBtn = document.getElementById('start-btn');
  const pauseIndicator = document.getElementById('pause-indicator');

  let cells = [];
  for (let i = 0; i < boardSize * boardSize; i++) {
    const cell = document.createElement('div');
    cell.classList.add('cell');
    board.appendChild(cell);
    cells.push(cell);
  }

  let snake, direction, foodIndex, score, speed, lastTime, paused, gameStarted;

  let highScore = localStorage.getItem('snakeHighScore') || 0;
  highScoreDisplay.textContent = highScore;

  function initGame() {
    snake = [2, 1, 0];
    direction = 1;
    score = 0;
    speed = 200;
    paused = false;
    gameStarted = true;
    lastTime = 0;

    scoreDisplay.textContent = score;
    gameOverOverlay.classList.remove('show');
    startScreen.classList.remove('show');
    pauseIndicator.classList.remove('show');

    cells.forEach(cell => cell.className = 'cell');
    snake.forEach(i => cells[i].classList.add('snake'));
    cells[snake[0]].classList.add('snake-head');

    placeFood();
    requestAnimationFrame(gameLoop);
  }

  function gameLoop(timestamp) {
    if (!gameStarted) return;

    if (!lastTime) lastTime = timestamp;
    const delta = timestamp - lastTime;

    if (!paused && delta > speed) {
      moveSnake();
      lastTime = timestamp;
    }

    requestAnimationFrame(gameLoop);
  }

  function placeFood() {
    do {
      foodIndex = Math.floor(Math.random() * cells.length);
    } while (snake.includes(foodIndex));

    cells.forEach(c => c.classList.remove('food'));
    cells[foodIndex].classList.add('food');
  }

  function moveSnake() {
    const head = snake[0];
    const newHead = head + direction;

    const hitWall =
      (direction === 1 && newHead % boardSize === 0) ||
      (direction === -1 && head % boardSize === 0) ||
      (direction === boardSize && newHead >= boardSize * boardSize) ||
      (direction === -boardSize && newHead < 0);

    if (hitWall || snake.includes(newHead)) {
      endGame();
      return;
    }

    snake.unshift(newHead);

    if (newHead === foodIndex) {
      score++;
      scoreDisplay.textContent = score;

      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreDisplay.textContent = highScore;
      }

      speed = Math.max(60, speed - 5);
      placeFood();
    } else {
      const tail = snake.pop();
      cells[tail].classList.remove('snake');
    }

    cells.forEach(c => c.classList.remove('snake-head'));
    snake.forEach(i => cells[i].classList.add('snake'));
    cells[snake[0]].classList.add('snake-head');
  }

  function changeDirection(e) {
    if (!gameStarted) return;

    const key = e.key.toLowerCase();

    const goingUp = direction === -boardSize;
    const goingDown = direction === boardSize;
    const goingLeft = direction === -1;
    const goingRight = direction === 1;

    if (key === 'arrowup' && !goingDown) direction = -boardSize;
    else if (key === 'arrowdown' && !goingUp) direction = boardSize;
    else if (key === 'arrowleft' && !goingRight) direction = -1;
    else if (key === 'arrowright' && !goingLeft) direction = 1;
    else if (key === 'p') togglePause();
  }

  function togglePause() {
    paused = !paused;
    pauseIndicator.classList.toggle('show', paused);
  }

  function endGame() {
    gameStarted = false;
    gameOverOverlay.classList.add('show');
  }

  startBtn.addEventListener('click', initGame);
  restartBtn.addEventListener('click', initGame);
  document.addEventListener('keydown', changeDirection);
  pauseIndicator.addEventListener('click', togglePause);
})();
</script>
